<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RPG Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="gameContainer">

    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <div id="hud">
        <div class="panel">
            ❤️
            <div id="healthBar">
                <div id="healthFill"></div>
            </div>
        </div>

        <div class="panel" id="statsText"></div>
        <div class="panel" id="inventoryText"></div>
        <div class="panel">Enemies: <span id="enemyCount"></span></div>
        <div class="panel">Items: <span id="itemCount"></span></div>
        <div class="panel">FPS: <span id="fps"></span></div>
    </div>

    <div id="startScreen" class="overlay">
        <h1>⚔️ RPG</h1>
        <button id="startBtn">Start</button>
    </div>

    <div id="pauseScreen" class="overlay hidden">
        <h1>Paused</h1>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1>Game Over</h1>
        <button onclick="location.reload()">Restart</button>
    </div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
