<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2D RPG Adventure</title>

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ======================
       STYLES (GAME UI + LAYOUT)
  ======================= -->
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      color: white;
      overflow: hidden;
    }

    /* Main game container */
    #gameWrapper {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* Top HUD */
    #topHUD {
      height: 60px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 2px solid #444;
    }

    .hud-section {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    /* Health bar */
    #healthContainer {
      width: 200px;
      height: 20px;
      background: #550000;
      border: 2px solid #aaa;
      position: relative;
    }

    #healthBar {
      height: 100%;
      width: 100%;
      background: red;
    }

    /* Inventory */
    #inventory {
      display: flex;
      gap: 10px;
    }

    .item-slot {
      width: 40px;
      height: 40px;
      background: #333;
      border: 2px solid #777;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* Game area */
    #gameContainer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      position: relative;
    }

    canvas {
      border: 3px solid #666;
      background: #111;
    }

    /* Floating UI (like damage text, messages later) */
    #floatingUI {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      width: 100%;
      height: 100%;
    }

    /* Bottom panel */
    #bottomPanel {
      height: 80px;
      background: #222;
      border-top: 2px solid #444;
      display: flex;
      align-items: center;
      padding: 10px;
      justify-content: space-between;
    }

    #controls {
      font-size: 14px;
      color: #ccc;
    }

    /* Buttons (future use) */
    .game-button {
      padding: 8px 14px;
      background: #444;
      border: 1px solid #888;
      cursor: pointer;
      color: white;
    }

    .game-button:hover {
      background: #666;
    }

    /* Start screen overlay */
    #startScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #startScreen h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    #startScreen button {
      font-size: 18px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- ======================
     MAIN GAME STRUCTURE
====================== -->
<div id="gameWrapper">

  <!-- TOP HUD -->
  <div id="topHUD">
    
    <!-- Health -->
    <div class="hud-section">
      <span>❤️ Health</span>
      <div id="healthContainer">
        <div id="healthBar"></div>
      </div>
    </div>

    <!-- Inventory -->
    <div class="hud-section" id="inventory">
      <div class="item-slot">🗡️</div>
      <div class="item-slot">🛡️</div>
      <div class="item-slot">🧪</div>
    </div>

  </div>

  <!-- GAME AREA -->
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- Floating UI layer -->
    <div id="floatingUI"></div>

    <!-- START SCREEN -->
    <div id="startScreen">
      <h1>2D RPG</h1>
      <button onclick="startGame()">Start Game</button>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottomPanel">
    
    <div id="controls">
      Move: WASD | Attack: Space | Explore & Survive ⚔️
    </div>

    <div>
      <button class="game-button">Inventory</button>
      <button class="game-button">Map</button>
      <button class="game-button">Settings</button>
    </div>

  </div>

</div>

<!-- ======================
     GAME SCRIPT
====================== -->
<script src="game.js"></script>

<!-- ======================
     BASIC START FUNCTION
====================== -->
<script>
  function startGame() {
    document.getElementById("startScreen").style.display = "none";
  }

  // Optional: update health bar dynamically
  function updateHealthBar(current, max) {
    const percent = (current / max) * 100;
    document.getElementById("healthBar").style.width = percent + "%";
  }
</script>

</body>
</html>
